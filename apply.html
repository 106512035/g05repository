<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name = "description" content = "Apply Page">
    <meta name = "keywords" content = "HTML, doctype, head, body, meta, paragraph, headings, strong, emphasis">
    <meta name = "author" content = "Bianca Zerveas">
    <title>Apply</title>
</head>

<body>
    <form method="post" action="https://mercury.swin.edu.au/it000000/formtest.php">

        <h1>[BRAND NAME] Application Page</h1>
        <p>This is [BRAND NAME] job application page. Please enter your information following the criterias to ensure all information is factual.</p>

       
            
        <p><label for="jobid">Job Reference ID</label> 
        <input type="text" name= "jobid" id="jobid" maxlength="5" size="10" required="required" pattern="[a-zA-Z0-9]{5}">
        </p>
        
        <fieldset>
            <legend>Personal Information</legend>
            <p><label for="firstname">First Name</label>
            <input type="text" name="firstname" id="firstname" size="10" required="required" pattern="[A-Za-z]{1,20}"></p>
            <p><label for="lastname">Last Name</label>
            <input type="text" name="lastname" id="lastname" size="10" required="required" pattern="[A-Za-z]{1,20}"></p>
            <p><label for="dob">Date of Birth</label> 
            <input type="text" name= "dob" id="dob" size="13" placeholder="DD/MM/YYYY" pattern="[0-3][0-9]/[0-1][0-9]/[0-9][0-9][0-9][0-9]" required="required"></p>
            <p><label for="streetaddress">Street Address</label> 
            <input type="text" name= "streetaddress" id="streetaddress" size="40" pattern="^[a-zA-Z0-9\s/]{1,40}$" required="required"></p>
            <p><label for="suburb">Suburb</label> 
            <input type="text" name= "suburb" id="suburb" size="10" pattern="[a-zA-Z]{1,40}" required="required"></p>
            <p><label for="state">State</label> 
                <select name="state" id="state" required="required">
                    <option value="">Please Select</option>			
                    <option value="vic">VIC</option>			
                    <option value="nsw">NSW</option>
                    <option value="qld">QLD</option>
                    <option value="nt">NT</option>
                    <option value="wa">WA</option>
                    <option value="sa">SA</option>
                    <option value="tas">TAS</option>
                    <option value="act">ACT</option>
                </select>
            <p><label for="postcode">Postcode</label> 
            <input type="text" name= "postcode" id="postcode" size="5" pattern="[0-9]{4}" required="required"></p>
            <p><label for="email">Email</label> 
                <input type="email" name= "email" id="email" size="10" required="required"></p> 
            <p><label for="phoneno">Phone Number</label>
                <input type="text" name= "phoneno" id="phoneno" size="12" pattern="[0-9]{8,12}" required="required"></p>
        </fieldset>
        <fieldset>
            <p><label for="gender">Gender</label>
                <p><label for="male">Male</label> 
                <input type="radio" id="male" name="gender" value="male" required="required">
                <label for="female">Female</label> 
                <input type="radio" id="female" name="gender" value="female" required="required">
                <label for="other">Other</label> 
                <input type="radio" id="other" name="gender" value="other" required="required">
            </p>
        </fieldset>
        <fieldset>
            <legend>Skill List ADD REQUIREMENT</legend>
            <p><label for="service">Customer Service</label> 
                <input type="checkbox" id="service" name="language[]" value="service">
            <p><label for="digital">Basic Understandings of IT</label> 
                <input type="checkbox" id="digital" name="language[]" value="digital">
            <p><label for="teamwork">Experience of working in teams</label> 
                <input type="checkbox" id="teamwork" name="language[]" value="teamwork">
        </fieldset>
        </fieldset>
            

    <input type= "submit" value="Book">
	<input type= "reset" value="Reset Form">
</form>
</body>
</html>
